version: "3.9"

services:
  # 1. 主程序 (Cassandra)
  app:
    container_name: cassandra-app
    build: .  # 使用当前目录的 Dockerfile 构建
    restart: unless-stopped
    ports:
      - "7897:5000"  # Flask API
      - "8501:8501"  # Streamlit (如果有)
    environment:
      - REDIS_URL=redis://redis:6379/0
      - PYTHONUNBUFFERED=1
    env_file:
      - .env
    volumes:
      - .:/app            # 挂载当前代码，方便开发调试
      - ./logs:/app/logs
      - ./final_reports:/app/final_reports
    depends_on:
      - redis

  # 2. Redis (解决 State Bloat 的关键)
  redis:
    image: redis:7.2-alpine
    container_name: bio-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
