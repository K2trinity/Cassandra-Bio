<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>SocketIO 测试</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #1e293b;
            color: #e2e8f0;
            padding: 20px;
        }
        button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 12px 24px;
            margin: 10px 5px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background: #2563eb;
        }
        #status {
            padding: 20px;
            background: #0f172a;
            border-radius: 8px;
            margin: 20px 0;
        }
        .success { color: #10b981; }
        .error { color: #ef4444; }
    </style>
</head>
<body>
    <h1>🧪 Real-Time Terminal 图片测试</h1>
    
    <div id="status">
        <h3>连接状态: <span id="connectionStatus" class="error">未连接</span></h3>
    </div>
    
    <div>
        <button onclick="sendTestLogs()">📤 发送测试日志（含图片）</button>
        <button onclick="sendScanningLog()">🔍 发送扫描日志</button>
        <button onclick="sendWarningLog()">⚠️ 发送警告日志</button>
        <button onclick="window.open('http://localhost:8765', '_blank')">🚀 打开主页面</button>
    </div>
    
    <div style="margin-top: 30px; padding: 20px; background: #0f172a; border-radius: 8px;">
        <h3>📋 测试步骤：</h3>
        <ol>
            <li>打开主页面 (点击上面的"打开主页面"按钮)</li>
            <li>返回这个页面</li>
            <li>点击"发送测试日志"按钮</li>
            <li>在主页面观察Real-Time Terminal中的日志和图片预览</li>
        </ol>
    </div>

    <script>
        // 连接到主服务器
        const socket = io('http://localhost:8765');
        
        socket.on('connect', () => {
            document.getElementById('connectionStatus').textContent = '✅ 已连接';
            document.getElementById('connectionStatus').className = 'success';
            console.log('✅ Connected to Cassandra server');
        });
        
        socket.on('disconnect', () => {
            document.getElementById('connectionStatus').textContent = '❌ 断开';
            document.getElementById('connectionStatus').className = 'error';
            console.log('❌ Disconnected');
        });
        
        function sendTestLogs() {
            console.log('📤 Sending test logs with images...');
            
            // 测试图片路径
            const testImages = [
                'western_blot_1.png',
                'gel_electrophoresis.png',
                'microscopy_image.png',
                'figure_analysis.png'
            ];
            
            // 开始分析
            socket.emit('log', {
                level: 'info',
                message: '🚀 [TEST] Starting forensic analysis simulation...'
            });
            
            // 逐个扫描图片
            testImages.forEach((imgName, idx) => {
                setTimeout(() => {
                    // 扫描日志（带图片）
                    socket.emit('log', {
                        level: 'scanning',
                        message: `🔍 Analyzing figure ${idx + 1}/${testImages.length}: ${imgName}`,
                        image_path: `/static/temp/${imgName}`
                    });
                    
                    // 分析结果
                    setTimeout(() => {
                        if (idx === 1) {
                            socket.emit('log', {
                                level: 'warning',
                                message: `    ⚠️  SUSPICIOUS (risk: 0.75) - Potential manipulation`,
                                image_path: `/static/temp/${imgName}`
                            });
                        } else {
                            socket.emit('log', {
                                level: 'success',
                                message: '    ✅ CLEAN (risk: 0.00) - No anomalies detected'
                            });
                        }
                    }, 500);
                    
                }, idx * 1500);
            });
            
            // 完成
            setTimeout(() => {
                socket.emit('log', {
                    level: 'success',
                    message: `✅ [TEST] Forensic audit complete: ${testImages.length} figures analyzed`
                });
            }, testImages.length * 1500 + 500);
            
            alert('✅ 测试日志已发送！\n请查看主页面的Real-Time Terminal');
        }
        
        function sendScanningLog() {
            socket.emit('log', {
                level: 'scanning',
                message: '🔍 Analyzing figure: test_western_blot.png',
                image_path: '/static/temp/test_western_blot.png'
            });
            alert('✅ 扫描日志已发送！');
        }
        
        function sendWarningLog() {
            socket.emit('log', {
                level: 'warning',
                message: '⚠️  SUSPICIOUS - Detected image manipulation',
                image_path: '/static/temp/suspicious_image.png'
            });
            alert('✅ 警告日志已发送！');
        }
    </script>
</body>
</html>
