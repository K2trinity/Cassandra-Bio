{% extends "base.html" %}

{% block title %}K-line Workspace - Cassandra{% endblock %}

{% block content %}
<section
    id="kline-workspace"
    class="flex-1 overflow-auto bg-slate-900 p-6"
    data-workspace='{{ workspace | tojson }}'
    data-error='{{ error | tojson }}'
>
    <div class="mx-auto flex max-w-7xl flex-col gap-4">
        <header class="flex flex-wrap items-center justify-between gap-3">
            <div>
                <p class="text-sm uppercase tracking-wide text-emerald-400">K-line Workspace</p>
                <h2 class="text-2xl font-semibold text-white">
                    {% if workspace %}{{ workspace.ticker }}{% else %}Unavailable{% endif %}
                </h2>
            </div>
            <select
                data-role="ticker-selector"
                class="rounded border border-slate-700 bg-slate-950 px-3 py-2 text-sm text-white"
            >
                {% if workspace %}
                <option value="{{ workspace.ticker }}">{{ workspace.ticker }}</option>
                {% else %}
                <option value="">Ticker</option>
                {% endif %}
            </select>
        </header>

        {% if error %}
        <div class="rounded border border-red-800 bg-red-950/40 p-4 text-sm text-red-200">
            {{ error }}
        </div>
        {% endif %}

        <div class="grid gap-4 lg:grid-cols-[minmax(0,1fr)_320px]">
            <div class="min-h-[420px] rounded border border-slate-800 bg-slate-950"></div>
            <aside class="grid gap-4">
                <section data-panel="catalysts" class="rounded border border-slate-800 bg-slate-950 p-4"></section>
                <section data-panel="details" class="rounded border border-slate-800 bg-slate-950 p-4"></section>
                <section data-panel="backtest" class="rounded border border-slate-800 bg-slate-950 p-4"></section>
                <section data-panel="status" class="rounded border border-slate-800 bg-slate-950 p-4"></section>
            </aside>
        </div>
    </div>
</section>
{% endblock %}

{% block scripts %}
<script src="/static/vendor/pokie-chart.umd.js"></script>
<script src="/static/kline/workspace.js"></script>
{% endblock %}
